<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator - Ai Trends</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style-ai.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo">⚡ Ai Trends</a>
        </div>
        <div class="nav-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <div class="hamburger" onclick="toggleMenu()">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </nav>

    <!-- Dropdown Menu -->
    <div class="dropdown-menu" id="dropdownMenu">
        <a class="menu-item" href="index.html" onclick="toggleMenu()">Home 🏠</a>
        <a class="menu-item" href="ai-generator.html" onclick="toggleMenu()" style="color:var(--primary)">AI Studio 🤖</a>
        <div style="padding:15px 10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--text); font-weight:600;">Language</span>
            <select id="langSelect" class="lang-select" onchange="changeLanguage()">
                <option value="en">🇺🇸 EN</option>
                <option value="id">🇮🇩 ID</option>
                <option value="es">🇪🇸 ES</option>
                <option value="jp">🇯🇵 JP</option>
            </select>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('image')">🎨 Image</button>
        </div>

        <!-- Image Tab -->
        <div id="tab-image" class="tab-content active">
            <h1>AI Image Generator</h1>
            <p class="subtitle">Powered by Pollinations AI • Model: Flux</p>
            
            <!-- Free Tier Display -->
            <div id="freeTierDisplay"></div>
            
            <!-- Prompt -->
            <textarea id="imgPrompt" class="prompt-area" placeholder="A cyberpunk cat..."></textarea>
            
            <!-- Tools -->
            <div class="tools-row">
                <button class="random-btn" onclick="fillRandomPrompt()">🎲 Random</button>
                <div class="ratio-row" style="display:flex; gap:5px;">
                    <button class="ratio-btn active" onclick="setRatio(1024,1024,this)">1:1</button>
                    <button class="ratio-btn" onclick="setRatio(768,1344,this)">9:16</button>
                    <button class="ratio-btn" onclick="setRatio(1344,768,this)">16:9</button>
                </div>
            </div>
            
            <!-- Generate Button -->
            <button class="action-btn-main" id="genImgBtn" onclick="generateImage()">✨ Generate</button>
            
            <!-- Result -->
            <div class="result-area">
                <div id="imgPlaceholder" class="placeholder-box">Your art will appear here</div>
                <div class="loader" id="imgLoader"></div>
                <p class="error-msg" id="errorMsg"></p>
                <div class="image-container" id="imgContainer">
                    <img id="generatedImage" src="" alt="Generated">
                </div>
                <div class="action-buttons" id="imgActions">
                    <button class="btn-small" onclick="downloadImage()">⬇️ Download</button>
                    <button class="btn-small" onclick="shareImage()">🔗 Share</button>
                    <button class="btn-small" onclick="regenerate()">🔄 Regenerate</button>
                </div>
            </div>
            
            <!-- Gallery -->
            <div class="gallery-section" id="gallerySection">
                <h3>Recent</h3>
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast">✅ Done!</div>

    <!-- Scripts -->
    <script src="js/script-ai.js"></script>
</body>
</html>
